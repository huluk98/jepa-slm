name: jepa-h20
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch>=2.4
  - pytorch-cuda=12.4
  - cuda-toolkit=12.4
  - nccl
  - numpy>=1.26
  - pyyaml>=6.0
  - packaging
  - ninja
  - cmake
  - pip:
      - accelerate>=0.34.0
      - datasets>=2.20.0
      - deepspeed>=0.14.5
      - einops>=0.8.0
      - evaluate>=0.4.2
      - sentencepiece>=0.2.0
      - tokenizers>=0.19.0
      - transformers>=4.44.0
      - wandb>=0.17.0
