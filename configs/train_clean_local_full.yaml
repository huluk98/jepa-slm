hardware:
  precision: bf16

distributed:
  compile: true

model:
  config_path: configs/model_0_2b.yaml

performance:
  dataloader_num_workers_per_rank: 4
  dataloader_prefetch_factor: 4
  persistent_workers: true

batching:
  source_length: 512
  target_length: 256
  per_gpu_micro_batch_sequences: 64
  gradient_accumulation_steps: 1
  # Packed blocks see 100% of the corpus; padded-512 mode would truncate away
  # 55% of its tokens (62% of docs exceed 512 tokens).
  sequence_packing: true

optimizer:
  learning_rate: 0.0004
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  warmup_fraction: 0.02

objective:
  ce_weight: 1.0
  jepa_weight_peak: 0.25
  jepa_warmup_fraction: 0.10
  jepa_final_phase_weight: 0.05
  jepa_final_phase_fraction: 0.20
  ema_tau_start: 0.99
  ema_tau_end: 0.9995
  vicreg_variance_weight: 0.04
  vicreg_covariance_weight: 0.01

data:
  # Full fineweb-edu sample-10BT, cleaned locally with
  # scripts/prepare_clean_corpus.py --max-docs 0 --output-dir data/clean/fineweb-edu-sample10bt-full
  # 9,672,082 docs / 9.436B t5-small tokens / 18,449,241 packed 512-token blocks.
  # See reports/full_corpus_manifest.json for shard checksums.
  dataset: "data/clean/fineweb-edu-sample10bt-full/clean-*.jsonl"
  subset: null
  split: train
  text_field: text
  tokenizer_name: google-t5/t5-small
  tokenizer_path: null
  tokenizer_use_fast: true
  streaming: true
  normalize_text: false
  min_chars: 0
  max_chars: null

runtime:
  output_dir: outputs/jepa-slm-clean-local-full
  # One epoch = 18,449,241 blocks / 64 blocks per step = 288,269 steps at
  # world_size 1. Each extra GPU divides the per-epoch step count (W GPUs ->
  # ~288269/W steps/epoch), so 288000 steps on 8 GPUs is ~8 epochs; rescale
  # max_steps to your GPU count. Cosine LR anneals to zero at max_steps, so
  # set the full budget up front.
  max_steps: 288000
  save_every_steps: 5000
  keep_last_checkpoints: 5
  # Plenty of memory at micro-batch 64 on H20-class GPUs; recompute would only
  # cost ~25-35% throughput.
  gradient_checkpointing: false
  log_every_steps: 50
  seed: 13
