hardware:
  accelerator: nvidia_h20
  num_nodes: 1
  gpus_per_node: 4
  assumed_memory_mib_per_gpu: 97871
  precision: bf16
  matmul_precision: high
  allow_tf32: true

distributed:
  launcher: torchrun
  strategy: ddp
  why: "0.2B params fits on each H20; 4-way DDP keeps the trainer simple."
  backend: nccl
  find_unused_parameters: false
  gradient_as_bucket_view: true
  static_graph: true
  compile: true

performance:
  dataloader_num_workers_per_rank: 8
  dataloader_prefetch_factor: 4
  pin_memory: true
  persistent_workers: true

model:
  config_path: configs/model_0_2b.yaml
  expected_trainable_params: 200200000

batching:
  source_length: 512
  target_length: 256
  per_gpu_micro_batch_sequences: 64
  gradient_accumulation_steps: 1
  global_batch_sequences: 256
  approximate_tokens_per_step: 196608
  dynamic_padding: true
  pad_to_multiple_of: 8

optimizer:
  name: adamw_torch_fused
  learning_rate: 0.0004
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  scheduler: cosine
  warmup_fraction: 0.02

objective:
  ce_weight: 1.0
  jepa_weight_peak: 0.25
  jepa_warmup_fraction: 0.10
  jepa_final_phase_weight: 0.05
  jepa_final_phase_fraction: 0.20
  ema_tau_start: 0.99
  ema_tau_end: 0.9995
  vicreg_variance_weight: 0.04
  vicreg_covariance_weight: 0.01

data:
  dataset: "data/clean/fineweb-edu-sample10bt-100k/clean-*.jsonl"
  subset: null
  split: train
  text_field: text
  tokenizer_name: google-t5/t5-small
  tokenizer_path: null
  tokenizer_use_fast: true
  streaming: true
  normalize_text: false
  min_chars: 0
  max_chars: null

runtime:
  output_dir: outputs/jepa-slm-h20-4gpu
  max_steps: 100000
  save_every_steps: 250
  # 250-step cadence over 100k steps = 400 checkpoints (~2.7 GiB each) if kept;
  # bound the rolling window so the outputs volume cannot fill mid-run.
  keep_last_checkpoints: 20
  # Explicit: activations recomputed in backward (~25-35% slower). Likely safe
  # to turn off on 96 GiB H20s; verify peak memory before flipping.
  gradient_checkpointing: true
  resume_from: null
  stop_file: outputs/jepa-slm-h20-4gpu/STOP
  save_on_stop: true
  log_every_steps: 10
  seed: 13

logging:
  log_every_steps: 10
  checkpoint_every_steps: 250
  report_tokens_per_second: true
  report_gpu_memory: true
  report_jepa_variance: true
