hardware:
  accelerator: nvidia_h20
  num_nodes: 1
  gpus_per_node: 8
  assumed_memory_gb_per_gpu: 96
  precision: bf16
  matmul_precision: high
  allow_tf32: true

distributed:
  launcher: torchrun
  strategy: ddp
  why: "0.2B params fits easily per H20; DDP avoids unnecessary FSDP/ZeRO communication."
  backend: nccl
  find_unused_parameters: false
  gradient_as_bucket_view: true
  static_graph: true
  compile: true

performance:
  attention_kernel: flash_attention_2_if_available
  activation_checkpointing: selective
  dataloader_num_workers_per_rank: 8
  dataloader_prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  sequence_packing: false
  fused_optimizer: adamw_torch_fused
  empty_cache_steps: 0

model:
  config_path: configs/model_0_2b.yaml
  expected_trainable_params: 200200000

batching:
  source_length: 512
  target_length: 256
  per_gpu_micro_batch_sequences: 64
  gradient_accumulation_steps: 1
  global_batch_sequences: 512
  approximate_tokens_per_step: 393216
  # Pad each batch to the longest member (multiple of 8) instead of always 512.
  dynamic_padding: true
  pad_to_multiple_of: 8
  # Set true to pack documents into full 512-token blocks (no padding waste,
  # static shapes). Off by default; enable once the baseline run is stable.
  sequence_packing: false

optimizer:
  name: adamw_torch_fused
  learning_rate: 0.0004
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  scheduler: cosine
  warmup_fraction: 0.02

objective:
  ce_weight: 1.0
  jepa_weight_peak: 0.25
  jepa_warmup_fraction: 0.10
  jepa_final_phase_weight: 0.05
  jepa_final_phase_fraction: 0.20
  ema_tau_start: 0.99
  ema_tau_end: 0.9995
  # Explicit anti-collapse penalty on the masked latents (on top of EMA + norm).
  vicreg_variance_weight: 0.04
  vicreg_covariance_weight: 0.01

data:
  pilot_dataset: HuggingFaceFW/fineweb-edu
  pilot_subset: sample-10BT
  main_dataset: HuggingFaceTB/smollm-corpus
  main_mixture:
    fineweb-edu-dedup: 0.55
    cosmopedia-v2: 0.20
    math: 0.10
    code: 0.10
    instruction-distill: 0.05
  tokenizer_name: google-t5/t5-small
  tokenizer_path: null
  tokenizer_use_fast: true
  split: train
  text_field: text
  streaming: true
  normalize_text: true
  min_chars: 200
  max_chars: 20000
  # Set to a held-out source (path/glob or HF name) to enable periodic eval_ce.
  eval_dataset: null

runtime:
  output_dir: outputs/jepa-slm-h20
  # ~393k tokens/step x 50000 steps = ~19.6B tokens (~5x Chinchilla-optimal for
  # 0.2B). Raise toward ~130000 steps for the documented 50B "main" recipe.
  max_steps: 50000
  save_every_steps: 2000
  # Bound the rolling checkpoint window (~2.7 GiB each; 25 saves over the run).
  keep_last_checkpoints: 10
  # Explicit: activations recomputed in backward (~25-35% slower). Likely safe
  # to turn off on 96 GiB H20s; verify peak memory before flipping.
  gradient_checkpointing: true
  log_every_steps: 10
  # Validation-CE every N steps (needs data.eval_dataset set); 0 disables.
  eval_every_steps: 0
  eval_max_batches: 50
  seed: 13

logging:
  log_every_steps: 10
  eval_every_steps: 1000
  checkpoint_every_steps: 2000
  report_tokens_per_second: true
  report_gpu_memory: true
  report_jepa_variance: true
