hardware:
  accelerator: nvidia_h20
  num_nodes: 1
  gpus_per_node: 8
  assumed_memory_gb_per_gpu: 96
  precision: bf16
  matmul_precision: high
  allow_tf32: true

distributed:
  launcher: torchrun
  strategy: ddp
  why: "0.2B params fits easily per H20; DDP avoids unnecessary FSDP/ZeRO communication."
  backend: nccl
  find_unused_parameters: false
  gradient_as_bucket_view: true
  static_graph: true
  compile: true

performance:
  attention_kernel: flash_attention_2_if_available
  activation_checkpointing: selective
  dataloader_num_workers_per_rank: 8
  dataloader_prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  sequence_packing: false
  fused_optimizer: adamw_torch_fused
  empty_cache_steps: 0

model:
  config_path: configs/model_0_2b.yaml
  expected_trainable_params: 200200000

batching:
  source_length: 512
  target_length: 256
  per_gpu_micro_batch_sequences: 64
  gradient_accumulation_steps: 1
  global_batch_sequences: 512
  approximate_tokens_per_step: 393216
  batch_autotune:
    enabled: false
    start_per_gpu_sequences: 64
    max_per_gpu_sequences: 192
    growth_factor: 1.25
    memory_target_fraction: 0.92

optimizer:
  name: adamw_torch_fused
  learning_rate: 0.0004
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  scheduler: cosine
  warmup_fraction: 0.02

objective:
  ce_weight: 1.0
  jepa_weight_peak: 0.25
  jepa_warmup_fraction: 0.10
  jepa_final_phase_weight: 0.05
  ema_tau_start: 0.99
  ema_tau_end: 0.9995
  variance_covariance_regularizers: monitor_first

data:
  pilot_dataset: HuggingFaceFW/fineweb-edu
  pilot_subset: sample-10BT
  main_dataset: HuggingFaceTB/smollm-corpus
  main_mixture:
    fineweb-edu-dedup: 0.80
    cosmopedia-v2: 0.15
    python-edu: 0.05
  tokenizer_name: google-t5/t5-small
  tokenizer_path: null
  split: train
  text_field: text
  streaming: true

runtime:
  output_dir: outputs/jepa-slm-h20
  max_steps: 1000
  save_every_steps: 1000
  log_every_steps: 10
  seed: 13

logging:
  log_every_steps: 10
  eval_every_steps: 1000
  checkpoint_every_steps: 2000
  report_tokens_per_second: true
  report_gpu_memory: true
  report_jepa_variance: true
