name: sanity

on:
  push:
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts and package
        run: |
          python -m py_compile scripts/jepa_research_agent.py scripts/jepa_verifier_agent.py scripts/dataset_recommender_agent.py scripts/h20_sanity_check.py src/jepa_slm/*.py
      - name: Regenerate reports
        run: |
          python scripts/jepa_research_agent.py
          python scripts/jepa_verifier_agent.py
          python scripts/dataset_recommender_agent.py
